<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Sale - Pre-loved home items in Karachi</title>
  <meta name="description" content="Pre-loved home items available for pickup in Karachi, Pakistan. Browse furniture, electronics, appliances and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand-row">
        <span class="brand-badge"><svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></span>
        <h1 class="site-title">Home Sale</h1>
      </div>
      <p class="site-subtitle">Pre-loved home items available for pickup</p>
      <span class="pickup-note" id="pickupNote"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> Pickup from Karachi. Exact location shared after confirmation.</span>
    </div>
  </header>

  <section class="controls">
    <div class="container">
      <div class="search-wrap">
        <span class="search-icon"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="search" id="searchInput" placeholder="Search items, e.g. sofa, Samsung, HEPA..." autocomplete="off" />
      </div>
      <div class="controls-row">
        <div class="category-filters" id="categoryFilters"></div>
        <div class="sort-wrap">
          <label for="sortSelect"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M4 6h16M6 12h12M9 18h6"/></svg> Sort</label>
          <select id="sortSelect">
            <option value="featured">Featured first</option>
            <option value="price-asc">Price: low to high</option>
            <option value="price-desc">Price: high to low</option>
            <option value="newest">Newest first</option>
            <option value="available">Available first</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <main class="container">
    <p class="results-meta" id="resultsMeta"></p>
    <div class="product-grid" id="productGrid">
      <div class="state-msg"><h3>Loading items...</h3></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div><strong>Home Sale</strong> &middot; Pre-loved items, Karachi, Pakistan</div>
      <div>Pickup only &middot; Prices in Rs. &middot; Message on WhatsApp to reserve</div>
    </div>
  </footer>

  <script src="icons.js"></script>
  <script src="script.js"></script>
</body>
</html>
